name: Build APK and Notify Teams

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Notify Teams
        if: ${{ success() && env.TEAMS_WEBHOOK_URL != '' }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA::7}"

          cat > payload.json <<EOF
          {
            "text": "APK build successful for *${{ github.repository }}* on branch *${{ github.ref_name }}*. Commit: ${SHORT_SHA}. Download artifact from: ${RUN_URL}"
          }
          EOF

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "$TEAMS_WEBHOOK_URL"

      - name: Teams webhook not configured
        if: ${{ success() && env.TEAMS_WEBHOOK_URL == '' }}
        run: echo "TEAMS_WEBHOOK_URL is not set. Skipping Teams notification."
